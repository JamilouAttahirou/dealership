{% extends 'main.html' %}

{% block content %}

{% load static %}

{% if page == 'login' %}
<div class="login-logout-page" style="background: url('{% static 'images/pexels-niclasharitos-18823134.jpg' %}') no-repeat;">
  <div class="login-logout-wrapper">
    <form method="POST" action="">
        {% csrf_token %}
        <h1>Login</h1>
        <div class="login-input-box">
            <input id="username" type="text" name="email" placeholder="Enter Email" required/>
            <i class='bx bxs-user'></i>
        </div>
        <div class="login-input-box">
            <input type="password" name="password" placeholder="Enter Password" required />
            <i class='bx bxs-lock-alt' ></i>
        </div>
        <div class="remember-forgot">
            <label><input type="checkbox">Remember Me</label>
            <a href="/">Forgot Password</a>
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="register-link">
            <p>Don't have an Account? <a href="{% url 'register' %}">Register</a></p>
        </div>
    </form>
  </div>
</div>

{% else %}

<div>
    <form method="POST" action="">
        {% csrf_token %}
        {{form.as_p}}
        <input type="submit" value="Register" />
    </form>
    <p>Already signed up yet?</p>
    <a href="{% url 'login' %}">Login</a>
</div>
{% endif %}

{% endblock content %}
